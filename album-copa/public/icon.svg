<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="c">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a3a6e"/>
      <stop offset="45%"  stop-color="#2d5a9e"/>
      <stop offset="100%" stop-color="#1a5ba8"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Elipses coloridas nos cantos (clip para não vazar) -->
  <g clip-path="url(#c)">
    <ellipse cx="70"  cy="130" rx="72" ry="90" fill="#2ea84e"/>
    <ellipse cx="442" cy="382" rx="72" ry="90" fill="#e8501a"/>
    <ellipse cx="442" cy="130" rx="65" ry="82" fill="#7b3fa8"/>
    <ellipse cx="70"  cy="382" rx="58" ry="75" fill="#e8b820"/>
    <ellipse cx="256" cy="68"  rx="50" ry="62" fill="#18a8c8"/>

    <!-- Faixa Panini vermelha topo -->
    <rect x="0" y="0" width="512" height="52" fill="#e8001a"/>

    <!-- Faixa escura inferior -->
    <rect x="0" y="428" width="512" height="84" fill="#050505" opacity="0.92"/>
  </g>

  <!-- Texto PANINI -->
  <text x="256" y="38" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="26" font-weight="800" fill="white" letter-spacing="6">PANINI</text>

  <!-- Taça dourada -->
  <g fill="#c8922a">
    <!-- Corpo da taça -->
    <path d="M186 128 L200 188 Q196 224 256 228 Q316 224 312 188 L326 128 Z"/>
    <!-- Alça esquerda -->
    <path d="M200 148 Q162 168 165 196 Q168 218 200 214" fill="none" stroke="#c8922a" stroke-width="14" stroke-linecap="round"/>
    <!-- Alça direita -->
    <path d="M312 148 Q350 168 347 196 Q344 218 312 214" fill="none" stroke="#c8922a" stroke-width="14" stroke-linecap="round"/>
    <!-- Base -->
    <rect x="226" y="228" width="60" height="14" rx="3"/>
    <rect x="210" y="242" width="92" height="12" rx="4"/>
  </g>

  <!-- Número 26 -->
  <text x="256" y="408" text-anchor="middle" font-family="Arial Black,Arial,sans-serif"
        font-size="210" font-weight="900" fill="white" opacity="0.97">26</text>

  <!-- Textos na faixa inferior -->
  <text x="256" y="458" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="20" font-weight="700" fill="#c8922a" letter-spacing="4">WORLD CUP 2026</text>
  <text x="256" y="496" text-anchor="middle" font-family="Arial Black,Arial,sans-serif"
        font-size="28" font-weight="900" fill="white">ÁLBUM COPA</text>

  <!-- Borda dourada -->
  <rect x="8" y="8" width="496" height="496" rx="90" fill="none" stroke="#c8922a" stroke-width="12"/>
</svg>
