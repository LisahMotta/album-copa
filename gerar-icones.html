<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerar Ícones PWA — Álbum Copa</title>
<style>
  body { font-family: Arial, sans-serif; padding: 24px; background: #f5f5f5; }
  h2 { color: #1a1a2e; margin-bottom: 8px; }
  .instrucoes { background: #fff3cd; border-left: 4px solid #c8922a; padding: 14px 16px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; line-height: 1.7; }
  .instrucoes b { color: #1a1a2e; }
  .grid { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 20px; }
  .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  canvas { display: block; border-radius: 8px; border: 1px solid #ddd; }
  .label { font-size: 13px; color: #666; margin-bottom: 8px; font-weight: bold; }
  button {
    display: block; width: 100%; margin-top: 10px; padding: 10px 14px;
    background: #c8922a; color: white; border: none; border-radius: 8px;
    font-size: 14px; cursor: pointer; font-weight: bold; font-family: Arial;
  }
  button:hover { background: #a87420; }
  button.verde { background: #22a05a; }
  button.verde:hover { background: #166534; }
  #status { margin-top: 16px; padding: 12px 16px; background: #d1fae5; border-radius: 8px; font-size: 14px; color: #065f46; display: none; }
</style>
</head>
<body>
<h2>⚽ Gerador de Ícones PWA — Álbum Copa 2026</h2>

<div class="instrucoes">
  <b>Como usar:</b><br>
  1. Clique em cada botão para baixar o arquivo<br>
  2. Salve os 3 arquivos na pasta <b>D:\album-copa\public\</b> (substituir os existentes)<br>
  3. No terminal: <b>git add public\ &amp;&amp; git commit -m "fix: ícones PWA" &amp;&amp; git push</b>
</div>

<div class="grid">
  <div class="card">
    <div class="label">512 × 512 px</div>
    <canvas id="c512" width="512" height="512" style="width:200px;height:200px"></canvas>
    <button onclick="baixar('c512','icon-512.png')">⬇ Baixar icon-512.png</button>
  </div>
  <div class="card">
    <div class="label">192 × 192 px</div>
    <canvas id="c192" width="192" height="192" style="width:192px;height:192px"></canvas>
    <button onclick="baixar('c192','icon-192.png')">⬇ Baixar icon-192.png</button>
    <button class="verde" onclick="baixar('c192','apple-touch-icon.png')">⬇ Baixar apple-touch-icon.png</button>
  </div>
</div>

<div id="status"></div>

<script>
function desenhar(canvas) {
  const ctx = canvas.getContext('2d')
  const s = canvas.width
  ctx.clearRect(0, 0, s, s)

  // Fundo arredondado
  ctx.save()
  ctx.beginPath()
  ctx.roundRect(0, 0, s, s, s * 0.18)
  ctx.fillStyle = '#0a1628'
  ctx.fill()
  ctx.clip()

  // Faixa azul topo
  ctx.fillStyle = '#1a3a6e'
  ctx.fillRect(0, 0, s, s * 0.40)

  // Faixa azul médio
  ctx.fillStyle = '#2d5a9e'
  ctx.fillRect(0, s * 0.37, s, s * 0.30)

  // Faixa azul baixo
  ctx.fillStyle = '#1a5ba8'
  ctx.fillRect(0, s * 0.62, s, s * 0.38)

  // Elipses coloridas nos cantos
  const el = (cx, cy, rx, ry, cor) => {
    ctx.beginPath()
    ctx.ellipse(cx*s, cy*s, rx*s, ry*s, 0, 0, Math.PI*2)
    ctx.fillStyle = cor
    ctx.fill()
  }
  el(0.13, 0.25, 0.11, 0.15, '#2ea84e')   // verde
  el(0.87, 0.75, 0.11, 0.15, '#e8501a')   // laranja
  el(0.87, 0.25, 0.10, 0.14, '#7b3fa8')   // roxo
  el(0.13, 0.75, 0.09, 0.13, '#e8b820')   // amarelo
  el(0.50, 0.13, 0.07, 0.09, '#18a8c8')   // ciano

  // Faixa Panini vermelha topo
  ctx.fillStyle = '#e8001a'
  ctx.fillRect(0, 0, s, s * 0.085)
  ctx.fillStyle = '#fff'
  ctx.font = `bold ${s*0.042}px Arial`
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText('PANINI', s/2, s*0.044)

  // Taça dourada
  const tx = s/2, ty = s*0.28, tw = s*0.22, th = s*0.17
  ctx.fillStyle = '#c8922a'
  // corpo
  ctx.beginPath()
  ctx.moveTo(tx-tw*0.44, ty-th*0.5)
  ctx.lineTo(tx-tw*0.30, ty+th*0.22)
  ctx.quadraticCurveTo(tx-tw*0.27, ty+th*0.56, tx, ty+th*0.56)
  ctx.quadraticCurveTo(tx+tw*0.27, ty+th*0.56, tx+tw*0.30, ty+th*0.22)
  ctx.lineTo(tx+tw*0.44, ty-th*0.5)
  ctx.closePath()
  ctx.fill()
  // alças
  ctx.lineWidth = s*0.02
  ctx.strokeStyle = '#c8922a'
  ctx.beginPath()
  ctx.moveTo(tx-tw*0.30, ty-th*0.18)
  ctx.quadraticCurveTo(tx-tw*0.50, ty, tx-tw*0.30, ty+th*0.30)
  ctx.stroke()
  ctx.beginPath()
  ctx.moveTo(tx+tw*0.30, ty-th*0.18)
  ctx.quadraticCurveTo(tx+tw*0.50, ty, tx+tw*0.30, ty+th*0.30)
  ctx.stroke()
  // base
  ctx.fillRect(tx-tw*0.16, ty+th*0.56, tw*0.32, th*0.10)
  ctx.beginPath()
  ctx.roundRect(tx-tw*0.23, ty+th*0.66, tw*0.46, th*0.09, 3)
  ctx.fill()

  // Número 26
  ctx.fillStyle = 'rgba(255,255,255,0.97)'
  ctx.font = `900 ${s*0.42}px 'Arial Black', Arial`
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText('26', s/2, s*0.665)

  // Faixa inferior escura
  ctx.fillStyle = 'rgba(5,5,5,0.90)'
  ctx.fillRect(0, s*0.84, s, s*0.16)

  ctx.fillStyle = '#c8922a'
  ctx.font = `700 ${s*0.036}px Arial`
  ctx.textBaseline = 'middle'
  ctx.fillText('WORLD CUP 2026', s/2, s*0.874)

  ctx.fillStyle = '#ffffff'
  ctx.font = `900 ${s*0.050}px 'Arial Black', Arial`
  ctx.fillText('ÁLBUM COPA', s/2, s*0.935)

  ctx.restore()

  // Borda dourada (fora do clip)
  ctx.beginPath()
  ctx.roundRect(s*0.018, s*0.018, s*0.964, s*0.964, s*0.16)
  ctx.strokeStyle = '#c8922a'
  ctx.lineWidth = s * 0.022
  ctx.stroke()
}

function baixar(id, nome) {
  const canvas = document.getElementById(id)
  const a = document.createElement('a')
  a.href = canvas.toDataURL('image/png')
  a.download = nome
  a.click()
  const st = document.getElementById('status')
  st.style.display = 'block'
  st.textContent = `✓ ${nome} baixado! Salve em D:\\album-copa\\public\\`
}

window.onload = () => {
  desenhar(document.getElementById('c512'))
  desenhar(document.getElementById('c192'))
}
</script>
</body>
</html>
